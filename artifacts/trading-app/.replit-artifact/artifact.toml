kind = "web"
previewPath = "/trading-app/"
title = "Trading App Interactive Prototype"
version = "1.0.0"
id = "artifacts/trading-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/trading-app/" ]
localPort = 20013

[services.development]
run = "pnpm --filter @workspace/trading-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-app", "run", "build" ]
publicDir = "artifacts/trading-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20013"
BASE_PATH = "/trading-app/"
